<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AHKMenu Builder - AHK v2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    :root {
      --bg: #080c12;
      --surface: #0d1117;
      --panel: #0f1520;
      --border: #1a2232;
      --border2: #243044;
      --text: #dde6f0;
      --muted: #8098b8;
      --dim: #506888;
      --cyan: #00d4ff;
      --cyan-dim: #00d4ff22;
      --green: #3dffa0;
      --pink: #ff6eb4;
      --blue: #5b9fff;
      --amber: #ffc55a;
      --purple: #b57bff;
      --red: #ff5577;
      --font-ui: 'JetBrains Mono', monospace;
      --font-sans: 'Plus Jakarta Sans', sans-serif;
      --font-hd: 'Syne', sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body,
    #root {
      height: 100%;
    }

    body {
      background: var(--bg);
      font-family: var(--font-sans);
      color: var(--text);
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.18;
    }

    #root {
      position: relative;
      z-index: 1;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--surface);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--muted);
    }

    select {
      appearance: none;
    }

    select option {
      background: #0d1117;
      color: var(--text);
    }

    * {
      transition: border-color 0.15s, color 0.15s, background 0.15s, box-shadow 0.15s;
    }

    .fade-in {
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(3px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>

    /* ── Tier 1: shell DLL icon catalog ─────────────────────────────────── */

    /* ── pre-mapped shell icons for template items ──────────────────────── */
    const ICON_MAP = {

    /* ── prebuilt templates ─────────────────────────────────────────────── */
    const TEMPLATES = {
      social: {
        label: "Social Media", accent: "#ff6eb4",
        items: [{
          type: "submenu", label: "Social Media", children: [

          ]
        }]

    /* ── uid / mkItem ───────────────────────────────────────────────────── */
    let _id = 1;
    const uid = () => `i${_id++}`;
    const mkItem = (type) => ({
      id: uid(), type, label: "", target: "",
      icon: "", iconType: "file", iconIdx: 0, iconEm: "",
      ...(type === "submenu" ? { children: [], expanded: true } : {})
    });

    /* ── persist ────────────────────────────────────────────────────────── */
    const SK = "ctxmenu_v3";
    const load = () => { try { const r = localStorage.getItem(SK); return r ? JSON.parse(r) : null; } catch { return null; } };
    const save = (items, hotkey) => { try { localStorage.setItem(SK, JSON.stringify({ items, hotkey })); } catch { } };

    /* ── icon line helper for codegen ───────────────────────────────────── */
    function iconLine(menuVar, label, item, fetchedIcons) {
      if (item.iconType === "shell" && item.icon) {
        // Tier 1: DLL reference - zero-dependency, always works
        return `    try ${menuVar}.SetIcon("${label}", "${item.icon}", ${item.iconIdx})`;
      }
      if (item.iconType === "favicon") {
        // Tier 2: local file in icons\ folder beside the script
        const fi = fetchedIcons?.[item.id];
        if (fi) return `    try ${menuVar}.SetIcon("${label}", A_ScriptDir . "\\icons\\${fi.filename}")`;
      }
      if (item.iconType === "file" && item.icon?.trim()) {
        return `    try ${menuVar}.SetIcon("${label}", "${item.icon.replace(/\\/g, "\\\\")}")`;
      }
      return null;
    }

    /* ── AHK codegen ────────────────────────────────────────────────────── */
    function buildAHK(items, hotkey, fetchedIcons = {}) {
      const modStr = hotkey.mods.map(m => MOD_SYM[m]).join("");
      const keyStr = hotkey.key.length === 1 ? hotkey.key.toLowerCase() : `{${hotkey.key}}`;
      const hk = modStr + keyStr;
      const subMenuDecls = [], subHandlers = [], mainBody = [], topHandlers = [];
      let topAi = 0, subIdx = 0;

      items.forEach(item => {
        if (item.type === "separator") { mainBody.push("    CtxMenu.Add()"); return; }

        if (item.type === "submenu" && item.label?.trim()) {
          const sn = `SubMenu_${subIdx}`, subBody = [];
          let childAi = 0;
          (item.children || []).forEach(child => {
            if (child.type === "separator") { subBody.push(`    ${sn}.Add()`); return; }
            if (!child.label?.trim() || !child.target?.trim()) return;
            const fn = `SubAct_${subIdx}_${childAi}`;
            subBody.push(`    ${sn}.Add("${child.label}", ${fn})`);
            const il = iconLine(sn, child.label, child, fetchedIcons);
            if (il) subBody.push(il);
            subHandlers.push(`${fn}(*) {\n    Run "${child.target.replace(/\\/g, "\\\\")}" \n}`);
            childAi++;
          });
          subMenuDecls.push(`    ${sn} := Menu()\n${subBody.join("\n")}`);
          mainBody.push(`    CtxMenu.Add("${item.label}", ${sn})`);
          const smil = iconLine("CtxMenu", item.label, item, fetchedIcons);
          if (smil) mainBody.push(smil);
          subIdx++;
          return;
        }

        if (!item.label?.trim() || !item.target?.trim()) return;
        const fn = `Action_${topAi}`;
        mainBody.push(`    CtxMenu.Add("${item.label}", ${fn})`);
        const il = iconLine("CtxMenu", item.label, item, fetchedIcons);
        if (il) mainBody.push(il);
        topHandlers.push(`${fn}(*) {\n    Run "${item.target.replace(/\\/g, "\\\\")}" \n}`);
        topAi++;
      });

      return `; =============================================
; AHK Context Menu - Generated by AHKMenu Builder
; Hotkey : ${hotkey.mods.join("+")}+${hotkey.key}
; Icons  : Tier 1 = Shell DLL | Tier 2 = icons\\ folder
; =============================================

#Requires AutoHotkey v2.0+
#SingleInstance Force

~*^s::Reload
Tray := A_TrayMenu
Tray.Delete(), Tray.AddStandard(), Tray.Add()
Tray.Add("Open Folder", (*) => Run(A_ScriptDir))
Tray.SetIcon("Open Folder", "shell32.dll", 5)

${hk}:: {
    CtxMenu := Menu()
${subMenuDecls.join("\n\n") ? subMenuDecls.join("\n\n") + "\n" : ""}${mainBody.join("\n")}
    CtxMenu.Show()
}

; --- Top-level Handlers ---
${topHandlers.join("\n\n")}${subHandlers.length ? "\n\n; --- Submenu Handlers ---\n" + subHandlers.join("\n\n") : ""}
`;
    }

    /* ── primitives ─────────────────────────────────────────────────────── */
    const SecLabel = ({ children }) => (
      <div style={{
        fontSize: 10, fontWeight: 700, letterSpacing: "0.18em", color: "#9ab4d0",
        textTransform: "uppercase", marginBottom: 12, display: "flex", alignItems: "center", gap: 8,

      }}>

    /* ── App ────────────────────────────────────────────────────────────── */
    function App() {
      const _s = load();
      if (_s?.items) {
        _s.items.forEach(i => {
          const n = parseInt(i.id.slice(1)); if (n >= _id) _id = n + 1;
          (i.children || []).forEach(c => { const m = parseInt(c.id.slice(1)); if (m >= _id) _id = m + 1; });
        });
      }
      const [items, setItems] = useState(_s?.items ?? []);
      const [hotkey, setHotkey] = useState(_s?.hotkey ?? { mods: ["Win"], key: "S" });
      const [sel, setSel] = useState(null);
      const [tab, setTab] = useState("build");
      const [copied, setCopied] = useState(false);
      const [flash, setFlash] = useState(false);
      const [pickerOpen, setPickerOpen] = useState(null);
      const [fetchedIcons, setFetchedIcons] = useState({});
      const [fetchingId, setFetchingId] = useState(null);
      const [faviconFallback, setFaviconFallback] = useState({}); // keyed by itemId: { active, domain, error }
      const [zipping, setZipping] = useState(false);
      const [helpOpen, setHelpOpen] = useState(false);
      const dragIdx = useRef(null);
      const childDragIdx = useRef(null);
      const faviconDebounce = useRef({});  // keyed by itemId, holds timeout ids
      const [dragOver, setDragOver] = useState(null);
      const [childDragOver, setChildDragOver] = useState(null);

      useEffect(() => {
        save(items, hotkey); setFlash(true);
        const t = setTimeout(() => setFlash(false), 1200); return () => clearTimeout(t);
      }, [items, hotkey]);

      const addTop = type => { const item = mkItem(type); setItems(p => [...p, item]); setSel(item.id); };
      const updTop = (id, k, v) => setItems(p => p.map(i => i.id === id ? { ...i, [k]: v } : i));
      const delTop = id => { setItems(p => p.filter(i => i.id !== id)); if (sel === id || sel?.startsWith(id + "__")) setSel(null); };
      const moveTop = (from, to) => { setItems(p => { const a = [...p]; const [x] = a.splice(from, 1); a.splice(to, 0, x); return a; }); };
      const addChild = (pid, type) => { const c = mkItem(type); setItems(p => p.map(i => i.id === pid ? { ...i, children: [...i.children, c] } : i)); setSel(pid + "__" + c.id); };
      const updChild = (pid, cid, k, v) => setItems(p => p.map(i => i.id === pid ? { ...i, children: i.children.map(c => c.id === cid ? { ...c, [k]: v } : c) } : i));
      const delChild = (pid, cid) => { setItems(p => p.map(i => i.id === pid ? { ...i, children: i.children.filter(c => c.id !== cid) } : i)); if (sel === pid + "__" + cid) setSel(pid); };
      const moveChild = (pid, from, to) => setItems(p => p.map(i => { if (i.id !== pid) return i; const a = [...i.children]; const [x] = a.splice(from, 1); a.splice(to, 0, x); return { ...i, children: a }; }));
      const toggleExp = pid => setItems(p => p.map(i => i.id === pid ? { ...i, expanded: !i.expanded } : i));
      const toggleMod = m => setHotkey(p => ({ ...p, mods: p.mods.includes(m) ? p.mods.filter(x => x !== m) : [...p.mods, m] }));

      /* Tier 1: apply shell icon from picker */
      const applyShellIcon = ic => {
        if (!pickerOpen) return;
        const { itemId, isChild, parentId } = pickerOpen;
        const fields = { icon: ic.dll, iconIdx: ic.idx, iconType: "shell", iconEm: ic.em };
        if (isChild) Object.entries(fields).forEach(([k, v]) => updChild(parentId, itemId, k, v));
        else Object.entries(fields).forEach(([k, v]) => updTop(itemId, k, v));
      };

      /* Tier 2: fetch favicon — tries vemetric first, falls back to Google if it fails (e.g. HTTPS mixed-content block) */
      const fetchFavicon = async (itemId, targetUrl, isChild, parentId, overrideDomain = null) => {
        setFetchingId(itemId);
        try {
          const domain = overrideDomain?.trim() || new URL(targetUrl).hostname;
          const filename = `${domain.replace(/[^a-zA-Z0-9]/g, "_")}.png`;

          let blob = null;
          for (const url of [
            `https://favicon.vemetric.com/https://${domain}/?size=32&format=png`,
            `https://api.faviconkit.com/${domain}/32`,
            `https://favicone.com/${domain}?s=32`,
            `https://t2.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://${domain}&size=32`,
            `https://icons.duckduckgo.com/ip3/${domain}.ico`,
            `https://favicon.im/${domain}?larger=true`,
            `https://www.google.com/s2/favicons?domain=${domain}&sz=32`,
          ]) {
            try {
              const r = await fetch(url);
              if (!r.ok) continue;
              const b = await r.blob();
              if (b.size > 100) { blob = b; break; }
            } catch (_) { continue; }
          }
          // last resort: img+canvas direct probe (works for sites that block fetch but allow img src)
          if (!blob) {
            blob = await new Promise(resolve => {
              const img = new Image();
              img.crossOrigin = 'anonymous';
              img.onload = () => {
                try {
                  const c = document.createElement('canvas');
                  c.width = 32; c.height = 32;
                  c.getContext('2d').drawImage(img, 0, 0, 32, 32);
                  c.toBlob(b => resolve(b && b.size > 100 ? b : null), 'image/png');
                } catch { resolve(null); }
              };
              img.onerror = () => resolve(null);
              img.src = `https://${domain}/favicon.ico`;
            });
          }
          if (!blob) throw new Error("All favicon services failed");
          const dataUrl = await new Promise((res, rej) => {
            const r = new FileReader();
            r.onload = () => res(r.result);
            r.onerror = () => rej(new Error("FileReader failed"));
            r.readAsDataURL(blob);
          });

          setFetchedIcons(p => ({ ...p, [itemId]: { filename, dataUrl } }));
          setFaviconFallback(p => ({ ...p, [itemId]: { active: false, domain: "", error: "" } })); // clear fallback on success
          const fields = { iconType: "favicon", icon: "", iconEm: "🌐" };
          if (isChild) Object.entries(fields).forEach(([k, v]) => updChild(parentId, itemId, k, v));
          else Object.entries(fields).forEach(([k, v]) => updTop(itemId, k, v));
        } catch (e) {
          // no alert - surface fallback domain input instead, pre-filled with extracted hostname
          let extractedDomain = "";
          try { extractedDomain = new URL(targetUrl).hostname; } catch (_) {}
          setFaviconFallback(p => ({ ...p, [itemId]: { active: true, domain: overrideDomain?.trim() || extractedDomain, error: e.message } }));
        } finally {
          setFetchingId(null);
        }
      };

      /* Tier 3: ZIP export (AHK + icons/ folder) */
      const exportZip = async () => {
        setZipping(true);
        try {
          const zip = new JSZip();
          const ahkCode = buildAHK(items, hotkey, fetchedIcons);
          zip.file("ContextMenu.ahk", ahkCode);
          if (Object.keys(fetchedIcons).length > 0) {
            const iconsDir = zip.folder("icons");
            for (const fi of Object.values(fetchedIcons)) {
              iconsDir.file(fi.filename, fi.dataUrl.split(",")[1], { base64: true });
            }
          }
          const zipBlob = await zip.generateAsync({ type: "blob" });
          Object.assign(document.createElement("a"), { href: URL.createObjectURL(zipBlob), download: "ContextMenu.zip" }).click();
        } catch (e) {
          alert(`ZIP export failed: ${e.message}`);
        } finally {
          setZipping(false);
        }
      };

      /* load template with pre-mapped Tier 1 shell icons */
      const loadTemplate = key => {
        const tpl = TEMPLATES[key];
        const newItems = tpl.items.map(raw => {
          const im = ICON_MAP[raw.label] ?? {};
          const item = {
            ...mkItem(raw.type), label: raw.label,
            icon: im.dll ?? "", iconIdx: im.idx ?? 0, iconType: im.dll ? "shell" : "file", iconEm: im.em ?? ""
          };
          if (raw.type === "submenu") {
            item.children = (raw.children || []).map(c => {
              const cm = ICON_MAP[c.label] ?? {};
              return {
                ...mkItem(c.type), label: c.label, target: c.target,
                icon: cm.dll ?? "", iconIdx: cm.idx ?? 0, iconType: cm.dll ? "shell" : "file", iconEm: cm.em ?? ""
              };
            });
          } else { item.target = raw.target || ""; }
          return item;
        });
        setItems(p => [...p, ...newItems]);

        // auto-fetch favicons for any url items in the loaded template
        newItems.forEach(item => {
          if (item.type === "url" && item.target?.trim()) {
            try { new URL(item.target); } catch (_) { return; }
            fetchFavicon(item.id, item.target, false, null);
          }
          (item.children || []).forEach(child => {
            if (child.type === "url" && child.target?.trim()) {
              try { new URL(child.target); } catch (_) { return; }
              fetchFavicon(child.id, child.target, true, item.id);
            }
          });
        });
      };

      const retryAllFailed = () => {
        items.forEach(item => {
          if (item.type === "url" && item.target?.trim() && faviconFallback[item.id]?.active && !fetchedIcons[item.id]) {
            fetchFavicon(item.id, item.target, false, null);
          }
          (item.children || []).forEach(child => {
            if (child.type === "url" && child.target?.trim() && faviconFallback[child.id]?.active && !fetchedIcons[child.id]) {
              fetchFavicon(child.id, child.target, true, item.id);
            }
          });
        });
      };

      const failedCount = Object.values(faviconFallback).filter(f => f.active).length;

      const selParts = sel?.includes("__") ? sel.split("__") : null;
      const selItem = selParts ? items.find(i => i.id === selParts[0]) : items.find(i => i.id === sel);
      const selChild = selParts ? selItem?.children?.find(c => c.id === selParts[1]) : null;
      const selTarget = selChild ?? (selItem?.type !== "separator" ? selItem : null);
      const isChildSel = !!selParts;
      const selId = isChildSel ? selParts[1] : selTarget?.id;

      const code = buildAHK(items, hotkey, fetchedIcons);
      const hkDisplay = [...hotkey.mods, hotkey.key].join(" + ");
      const faviconCount = Object.keys(fetchedIcons).length;
      const validCount = items.reduce((acc, i) => {
        if (i.type === "separator") return acc;
        if (i.type === "submenu") return acc + (i.children || []).filter(c => c.type !== "separator" && c.label?.trim() && c.target?.trim()).length;
        return acc + (i.label?.trim() && i.target?.trim() ? 1 : 0);
      }, 0);
      const download = () => { const b = new Blob([code], { type: "text/plain" }); Object.assign(document.createElement("a"), { href: URL.createObjectURL(b), download: "ContextMenu.ahk" }).click(); };
      const copy = () => { navigator.clipboard.writeText(code); setCopied(true); setTimeout(() => setCopied(false), 1800); };

      const IcTypeBtn = ({ label, active, onClick }) => (
        <button onClick={onClick} style={{
          flex: 1, padding: "6px 0", fontSize: 10, fontWeight: 700, borderRadius: 5, border: "1px solid",
          cursor: "pointer", fontFamily: "var(--font-sans)", letterSpacing: "0.05em",
          background: active ? "var(--cyan-dim)" : "var(--panel)",
          borderColor: active ? "var(--cyan)" : "var(--border2)",
          color: active ? "var(--cyan)" : "#9ab4d0"
        }}>
          {label}
        </button>
      );

      return (
        <div style={{ height: "100vh", display: "flex", flexDirection: "column" }}>
          {pickerOpen && <ShellIconPicker onSelect={applyShellIcon} onClose={() => setPickerOpen(null)} />}

                                  onMouseLeave={e => e.currentTarget.style.color = "var(--dim)"}>✕</button>
                              </div>

                                border: "1px solid", borderRadius: 6, cursor: "pointer", fontFamily: "var(--font-ui)",
                                background: selTarget.type === t ? TYPES[t].accent + "18" : "var(--panel)",

                                color: selTarget.type === t ? TYPES[t].accent : "var(--muted)"

                          <div>
                            <div style={{ fontSize: 11, color: "var(--green)", fontWeight: 600, marginBottom: 2 }}>Favicon fetched ✓</div>
                            <div style={{ fontSize: 10, color: "var(--muted)" }}>{fetchedIcons[selId].filename}</div>
                          </div>
                        </div>
                      )}
                      {selTarget.type === "url" && (
                        <div style={{ marginTop: 8 }}>
                          {/* fetching indicator */}
                          {fetchingId === selId && (
                            <div style={{
                              padding: "7px 10px", borderRadius: 6, background: "var(--panel)",
                              border: "1px solid var(--pink)44", fontSize: 11, color: "var(--pink)",
                              fontFamily: "var(--font-ui)", fontWeight: 600
                            }}>
                              ⏳ Fetching favicon...
                            </div>
                          )}
                          {/* fallback: vemetric failed - show manual domain input */}
                          {!fetchingId && faviconFallback[selId]?.active && (
                            <div style={{
                              padding: "10px", borderRadius: 7, background: "#1a0a10",
                              border: "1px solid #6a1030", marginTop: 4
                            }}>
                              <div style={{ fontSize: 10, color: "#e05070", marginBottom: 6, fontFamily: "var(--font-ui)", fontWeight: 700 }}>
                                Auto-fetch failed · enter domain manually
                              </div>
                              {faviconFallback[selId]?.error && (
                                <div style={{ fontSize: 9, color: "#804050", marginBottom: 6, fontFamily: "var(--font-ui)" }}>
                                  {faviconFallback[selId].error}
                                </div>
                              )}
                              <div style={{ display: "flex", gap: 5 }}>
                                <input
                                  value={faviconFallback[selId]?.domain || ""}
                                  onChange={e => setFaviconFallback(p => ({ ...p, [selId]: { ...p[selId], domain: e.target.value } }))}
                                  placeholder="e.g. youtube.com"
                                  style={{
                                    flex: 1, padding: "6px 8px", borderRadius: 5, fontSize: 11,
                                    background: "var(--panel)", border: "1px solid #6a1030",
                                    color: "var(--text)", fontFamily: "var(--font-ui)", outline: "none"
                                  }} />
                                <button
                                  onClick={() => {
                                    const d = faviconFallback[selId]?.domain?.trim();
                                    if (!d) return;
                                    fetchFavicon(selId, selTarget.target, isChildSel, isChildSel ? selParts[0] : null, d);
                                  }}
                                  style={{
                                    padding: "6px 10px", borderRadius: 5, fontSize: 11, fontWeight: 700,
                                    border: "1px solid var(--pink)66", background: "var(--pink)18",
                                    color: "var(--pink)", cursor: "pointer", fontFamily: "var(--font-ui)"
                                  }}>
                                  Retry
                                </button>
                              </div>
                            </div>
                          )}
                          <div style={{
                            marginTop: 6, padding: "5px 8px", borderRadius: 5, background: "#0a1a10",
                            border: "1px solid #1a3a20", fontSize: 10, color: "#3a8a50", lineHeight: 1.5
                          }}>
                            Favicon auto-fetched on URL input · bundled in icons\ on ZIP export
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                )}
              </aside>
            </div>
          )}

          {/* CODE TAB */}
          {tab === "code" && (
            <div style={{ flex: 1, display: "flex", flexDirection: "column", padding: 20, gap: 12, overflow: "hidden" }} className="fade-in">
              <div style={{
                display: "flex", alignItems: "center", gap: 8, flexShrink: 0,
                padding: "10px 16px", background: "var(--surface)", border: "1px solid var(--border)", borderRadius: 8
              }}>
                <span style={{ flex: 1, fontSize: 12, color: "var(--muted)" }}>
                  <span style={{ color: validCount > 0 ? "var(--green)" : "var(--muted)", fontWeight: 700 }}>{validCount}</span>
                  {" "}action{validCount !== 1 ? "s" : ""} · <span style={{ color: "var(--cyan)", fontWeight: 600 }}>{hkDisplay}</span>
                  {faviconCount > 0 && <span style={{ color: "var(--pink)", marginLeft: 12 }}>· 🌐 {faviconCount} favicon{faviconCount > 1 ? "s" : ""}</span>}
                </span>
                <button onClick={copy} style={{
                  padding: "7px 16px", fontSize: 12, fontWeight: 700, border: "1px solid", borderRadius: 6,
                  cursor: "pointer", fontFamily: "var(--font-sans)", letterSpacing: "0.04em",
                  background: copied ? "#0a2a1a" : "var(--panel)",
                  borderColor: copied ? "var(--green)" : "var(--border2)",
                  color: copied ? "var(--green)" : "var(--muted)",
                  boxShadow: copied ? "0 0 10px #3dffa020" : "none"
                }}>
                  {copied ? "✓ Copied!" : "Copy"}
                </button>
                <button onClick={download} style={{
                  padding: "7px 16px", fontSize: 12, fontWeight: 700, border: "1px solid var(--cyan)88",
                  borderRadius: 6, cursor: "pointer", fontFamily: "var(--font-ui)",
                  background: "var(--cyan-dim)", color: "var(--cyan)", letterSpacing: "0.06em"
                }}>
                  ↓ .ahk
                </button>
                <button onClick={exportZip} disabled={zipping} style={{
                  padding: "7px 20px", fontSize: 12, fontWeight: 700,
                  border: "1px solid var(--amber)88", borderRadius: 6,
                  cursor: zipping ? "wait" : "pointer", fontFamily: "var(--font-ui)",
                  background: "#ffc55a18", color: "var(--amber)", letterSpacing: "0.06em",
                  boxShadow: "0 0 12px #ffc55a14", opacity: zipping ? 0.6 : 1
                }}>
                  {zipping ? "⏳ Zipping..." : "↓ Export ZIP (Tier 3)"}
                </button>
              </div>
              {faviconCount === 0 && validCount > 0 && (
                <div style={{
                  padding: "8px 14px", borderRadius: 6, background: "#1a1200",
                  border: "1px solid #3a2800", fontSize: 11, color: "#906020", flexShrink: 0
                }}>
                  💡 Build tab → select a URL item → Fetch Favicon → Export ZIP to bundle branded icons
                </div>
              )}
              <div style={{
                flex: 1, overflow: "hidden", borderRadius: 10, border: "1px solid var(--border)",
                background: "var(--surface)", display: "flex", flexDirection: "column"
              }}>
                <div style={{
                  padding: "9px 14px", borderBottom: "1px solid var(--border)",
                  display: "flex", alignItems: "center", gap: 7, flexShrink: 0, background: "var(--panel)"
                }}>
                  <span style={{ width: 11, height: 11, borderRadius: "50%", background: "#ff5f57", display: "block" }} />
                  <span style={{ width: 11, height: 11, borderRadius: "50%", background: "#febc2e", display: "block" }} />
                  <span style={{ width: 11, height: 11, borderRadius: "50%", background: "#28c840", display: "block" }} />
                  <span style={{ flex: 1, textAlign: "center", fontSize: 11, color: "var(--muted)" }}>ContextMenu.ahk</span>
                </div>
                <pre style={{
                  flex: 1, margin: 0, padding: "18px 22px", overflowY: "auto", fontSize: 13,
                  lineHeight: 1.85, whiteSpace: "pre-wrap", wordBreak: "break-all", fontFamily: "var(--font-ui)"
                }}>
                  {code.split("\n").map((line, i) => (
                    <span key={i} style={{ color: colorLine(line), display: "block" }}>{line || "\u00A0"}</span>
                  ))}
                </pre>
              </div>
            </div>
          )}

          {helpOpen && <HelpModal onClose={() => setHelpOpen(false)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
